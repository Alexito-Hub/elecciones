steps:
  # Step to create .env file dynamically before build
  - name: 'gcr.io/cloud-builders/bash'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "VITE_API_URL=$VITE_API_URL" > .env
        echo "VITE_APP_TOKEN=$VITE_APP_TOKEN" >> .env
    env:
      - 'VITE_API_URL=${_VITE_API_URL}'
      - 'VITE_APP_TOKEN=${_VITE_APP_TOKEN}'
  - name: 'gcr.io/cloud-builders/docker'
    args: [ 'build', '-t', 'gcr.io/$PROJECT_ID/elecciones-web:$SHORT_SHA', '.' ]
  - name: 'gcr.io/cloud-builders/docker'
    args: [ 'push', 'gcr.io/$PROJECT_ID/elecciones-web:$SHORT_SHA' ]
  # Step to create .env file dynamically before build
  - name: 'gcr.io/cloud-builders/bash'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "VITE_API_URL=$VITE_API_URL" > .env
        echo "VITE_APP_TOKEN=$VITE_APP_TOKEN" >> .env
    env:
      - 'VITE_API_URL=${_VITE_API_URL}'
      - 'VITE_APP_TOKEN=${_VITE_APP_TOKEN}'

images:
  - 'gcr.io/$PROJECT_ID/elecciones-web:$SHORT_SHA'

substitutions:
  _REGION: 'us-central1'
  _VITE_API_URL: 'https://tu-api-url-segura'
  _VITE_APP_TOKEN: 'token-seguro'

