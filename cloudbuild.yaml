steps:
  - name: 'gcr.io/cloud-builders/bash'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "VITE_API_URL=$VITE_API_URL" > .env
        echo "VITE_APP_HOST=$VITE_APP_HOST" >> .env
        echo "VITE_OVERLAY_HOST=$VITE_OVERLAY_HOST" >> .env
        echo "VITE_APP_TOKEN=$VITE_APP_TOKEN" >> .env
        echo "Build variables generated in .env"
    env:
      - 'VITE_API_URL=${_VITE_API_URL}'
      - 'VITE_APP_HOST=${_VITE_APP_HOST}'
      - 'VITE_OVERLAY_HOST=${_VITE_OVERLAY_HOST}'
      - 'VITE_APP_TOKEN=${_VITE_APP_TOKEN}'
  - name: 'gcr.io/cloud-builders/docker'
    args: [ 'build', '-t', 'gcr.io/$PROJECT_ID/elecciones-web:$SHORT_SHA', '.' ]
  - name: 'gcr.io/cloud-builders/docker'
    args: [ 'push', 'gcr.io/$PROJECT_ID/elecciones-web:$SHORT_SHA' ]

images:
  - 'gcr.io/$PROJECT_ID/elecciones-web:$SHORT_SHA'

substitutions:
  _REGION: 'us-central1'
  # IMPORTANT: Set these values in the Cloud Build Trigger substitutions in GCP Console
  _VITE_API_URL: 'REPLACE_ME_IN_GCP_CONSOLE'
  _VITE_APP_HOST: 'REPLACE_ME_IN_GCP_CONSOLE'
  _VITE_OVERLAY_HOST: 'REPLACE_ME_IN_GCP_CONSOLE'
  _VITE_APP_TOKEN: 'REPLACE_ME_IN_GCP_CONSOLE'

